<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07-Selectors</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">   
</head>

<body>
    <header>
        <h1>CSS Dinner Shopping List</h1>
        <p>Let's go to the small</p>
    </header>
    <main>
        <ul class="shopping-list">
            <li>
                <label>
                    <input type="checkbox">
                    <span>A lot of pickles<small> (for the next lessons about CSS)</small></span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox" checked>
                    <span>10 apples<small> (for more CSS manipulations)</small></span>
                </label>
            </li>
            <li>
                <label>
                   <input type="checkbox">
                   <span>20 oranges<small> (because they are awesome)</small></span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>13 plates<small> (hm... they always dissapear)</small></span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>15 bentos</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>1 bottle of Sake<small> (for my friends)</small></span>
                </label>
            </li>
        </ul>
    </main>

    <form>
    <button type="button" class="bon-appetit" name="bon-appetit">
       Bon appetit :)
    </button>
    </form>
</body>
</html>
