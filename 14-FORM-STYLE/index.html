<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form elements style</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div class="container">
        <div class="form-wrapper">
            <section class="form-card">
                <h2>Create an Account</h2>
                <form action="#" method="post">
                    <div class="form-inner">
                        <div class="form-row">
                            <label for="firstname">First Name</label>
                            <input type="text" id="firstname" name="firstname" required>
                        </div>
                        <div class="form-row">
                            <label for="lastname">Last Name</label>
                            <input type="text" name="lastname" id="lastname" required>
                        </div>
                        <div class="form-row">
                            <label for="email">E-mail</label>
                            <input type="email" name="email" id="email">
                            <p>We'll never share your email with anyone else.</p>
                        </div>
                        <div class="form-row">
                            <ul>
                                <li>
                                    <label><input type="radio" name="gender" value="Male" checked>Male</label>
                                </li>
                                <li>
                                    <label><input type="radio" name="gender" value="Female">Female</label>
                                </li>
                            </ul>
                        </div>
                        <div class="form-row">
                            <label for="country">Country</label>
                            <select name="country" id="country">
                                <option value="" disabled selected hidden>Select</option>
                                <option value="Ukraine">Ukraine</option>
                                <option value="USA">USA</option>
                                <option value="France">France</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <label for="city">City</label>
                            <input type="text" name="city" id="city">
                        </div>

                        <div class="form-btn">
                            <button type="submit">Sign UP</button>
                        </div>
                    </div>
                    <p class="terms"> By clicking the 'Sign Up' button, you confirm that you accept our
                        <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.
                    </p>

                    <p class="login">
                        Have an account? <a href="#">Log In</a>
                    </p>
                </form>
            </section>

            <section class="form-card">
                <h2>Profile</h2>
                <form action="#" method="post">
                    <div class="profile-top">
                        <img src="#" alt="avatar" class="avatar">
                        <div class="upload">
                            <input type="file">
                            <p>Up to 1 MB (300x300 px)</p>
                        </div>
                    </div>
                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-row">
                        <label for="email-profile">E-mail</label>
                        <input type="email" name="email-profile" id="email-profile">
                    </div>
                    <div class="form-row">
                        <label for="country-profile">Country</label>
                        <select name="country-profile" id="country-profile">
                            <option value="" disabled selected hidden>Select</option>
                            <option value="Ukraine">Ukraine</option>
                            <option value="USA">USA</option>
                            <option value="France">France</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="city-profile">City</label>
                        <input type="text" name="city" id="city-profile">
                    </div>
                    <div class="form-row">
                        <label for="zipcode">Zip Code</label>
                        <input type="text" name="zipcode" id="zipcode">
                    </div>
                    <div class="form-row">
                        <label for="phonenumber">Phone Number</label>
                        <input type="text" name="phonenumber" id="phonenumber">
                    </div>
                    <div class="form-btn">
                        <button type="submit">Update</button>
                    </div>
                </form>
            </section>
        </div>
    </div>

</body>

</html>
