<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Grid</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Delius+Unicase:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
    <section class="gallery">
        <h1>ARCHITECTURAL PHOTOGRAPHY</h1>
    <div class="grid">
        <img src="./images/image1.png" alt="" class="small">
        <img src="./images/image2.png" alt="" class="wide">
        <img src="./images/image3.png" alt="" class="wide">
        <img src="./images/image4.png" alt="" class="small"> 
        <img src="./images/image5.png" alt="" class="small">
        <img src="./images/image6.png" alt="" class="wide">
    </div>
    </section>

    <section class="gallery">
        <h1>STILL LIFE PHOTOGRAPHY</h1>
    <div class="grid-life">
        <img src="./images/image7.png" alt="" class="small">
        <img src="./images/image8.png" alt="" class="wide">
        <img src="./images/image9.png" alt="" class="big">
        <img src="./images/image10.png" alt="" class="tall">
        <img src="./images/image11.png" alt="" class="wide">
        <img src="./images/image12.png" alt="" class="small">
    </div>
    </section>

    <section class="gallery">
        <h1>PORTRAIT AND FASHION PHOTOGRAPHY</h1>
    <div class="grid-portrait">
        <img src="./images/image13.png" alt="" class="small">
        <img src="./images/image14.png" alt="" class="tall">
        <img src="./images/image15.png" alt="" class="small">
        <img src="./images/image16.png" alt="" class="small">
        <img src="./images/image17.png" alt="" class="tall">
        <img src="./images/image18.png" alt="" class="tall">
        <img src="./images/image19.png" alt="" class="small">
        <img src="./images/image20.png" alt="" class="wide">
        <img src="./images/image21.png" alt="" class="wide">
        <img src="./images/image22.png" alt="" class="small">
    </div>
    </section>
    </div>
</body>
</html>
